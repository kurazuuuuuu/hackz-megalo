---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudflared-secret-sync
  namespace: default
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cloudflared-secret-provider
  namespace: default
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/hackz-megalo-cup/secrets/cloudflared-token-secret/versions/latest"
        path: "cloudflared-token"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: cloudflared-secret
  namespace: default
spec:
  serviceAccountName: cloudflared-secret-sync
  secretProviderClassName: cloudflared-secret-provider
  secretObject:
    type: Opaque
    data:
      - sourcePath: "cloudflared-token"
        targetKey: "CLOUDFLARED_TOKEN"

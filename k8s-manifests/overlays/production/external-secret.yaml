---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-store
spec:
  provider:
    gcpsm:
      # Automatically use the cluster's default Workload Identity for auth
      # Make sure the GKE cluster has Workload Identity enabled and the compute SA has Secret Manager Secret Accessor role.
      auth:
        workloadIdentity:
          clusterLocation: asia-northeast1 # Update if your cluster is in a different location
          clusterName: hackz-megalo-cluster # Update to match var.gke_cluster_name
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-external-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: cloudflared-secret # Matches the envFrom secretRef in Deployment
  data:
    - secretKey: CLOUDFLARED_TOKEN # Key inside K8s Secret
      remoteRef:
        key: cloudflared-token-secret # Name of the Secret in GCP Secret Manager

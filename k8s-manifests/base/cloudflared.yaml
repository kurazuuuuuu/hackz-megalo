apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args: ["tunnel", "--no-autoupdate", "run", "--token", "$(CLOUDFLARED_TOKEN)"]
          resources:
            requests:
              cpu: "100m"
              memory: "100M"
          envFrom:
            - secretRef:
                name: cloudflared-secret

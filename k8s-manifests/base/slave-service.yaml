apiVersion: apps/v1
kind: Deployment
metadata:
  name: slave-service
  labels:
    app: slave-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slave-service
  template:
    metadata:
      labels:
        app: slave-service
    spec:
      containers:
        - name: slave-service
          image: slave-service
          ports:
            - containerPort: 50051
          env:
            - name: SLAVE_GRPC_ADDR
              value: ":50051"
            - name: SLAVE_CONTROLLER_GRPC_TARGET
              value: "controller-service-svc:50052"
            - name: SLAVE_K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SLAVE_K8S_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: SLAVE_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SLAVE_POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SLAVE_INITIAL_REMAINING_TURNS
              value: "10"
---
apiVersion: v1
kind: Service
metadata:
  name: slave-service-svc
spec:
  type: ClusterIP
  selector:
    app: slave-service
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
